<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karlty Project</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { background-color: #f2f2fc; color: #302e4d; font-family: 'Poppins', sans-serif; padding: 40px 0; }
        .container { max-width: 1100px; margin: auto; padding: 0 15px; }
        .btn-back { display: inline-block; margin-bottom: 30px; padding: 10px 25px; background: #ec1839; color: #fff; border-radius: 30px; text-decoration: none; font-weight: 500; transition: all 0.3s ease; }
        .btn-back:hover { transform: scale(1.05); color: #fff; }
        h1 { text-align: center; margin-bottom: 40px; font-size: 32px; font-weight: 700; }
        .content-section { background: #fdf9ff; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.05); margin-bottom: 40px; }
        .pdf-viewer { width: 100%; height: 600px; border-radius: 10px; border: 1px solid #e8dfec; }
        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .gallery img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 300px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back"><i class="fa fa-arrow-left"></i> Back to Portfolio</a>
        
        <h1>Karlty Project Details</h1>

        <div class="content-section">
            <h2 style="margin-bottom: 20px; font-size: 24px;">Project PDF</h2>
            <!-- Replace 'karlty.pdf' with your actual PDF file name -->
            <embed src="New folder/Kartly.pdf" type="application/pdf" class="pdf-viewer" />
            <p style="text-align: center; margin-top: 15px;">
                <a href="New folder/Kartly.pdf" target="_blank" style="color: #ec1839; font-weight: 600;">Download PDF</a>
            </p>
        </div>

        <div class="content-section">
            <h2 style="margin-bottom: 20px; font-size: 24px;">Project Images</h2>
            <div class="gallery">
                <!-- Replace with actual image paths -->
                <img src="New folder/3.png" alt="Karlty Image">
            </div>
        </div>
    </div>
</body>
</html>
